<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Performance Booster</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <section class="panel">
        <div class="row top-row">
          <div>
            <p class="title">Booster</p>
            <p class="subtle">Reglages locaux</p>
          </div>
          <label class="switch" aria-label="Activer le booster">
            <input id="enabled" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>

        <div class="field">
          <div class="field-head">
            <label for="visibleCount">Visible</label>
            <output id="visibleCountValue">12</output>
          </div>
          <input id="visibleCount" type="range" min="3" max="80" step="1">
        </div>

        <div class="field">
          <div class="field-head">
            <label for="loadBatchSize">More</label>
            <output id="loadBatchSizeValue">10</output>
          </div>
          <input id="loadBatchSize" type="range" min="1" max="40" step="1">
        </div>

        <div class="field">
          <div class="field-head">
            <label for="trimThreshold">Start</label>
            <output id="trimThresholdValue">18</output>
          </div>
          <input id="trimThreshold" type="range" min="6" max="200" step="1">
        </div>

        <label class="toggle-row">
          <span>Reduce effects</span>
          <input id="reduceEffects" type="checkbox">
        </label>

        <label class="toggle-row">
          <span>Show overlay</span>
          <input id="showStatusBadge" type="checkbox">
        </label>

        <div class="footer">
          <button id="resetDefaults" type="button">Reset</button>
          <p id="status">Saved</p>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
